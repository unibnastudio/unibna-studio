<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brand Palettes | unibna.studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Raleway', sans-serif;
  background:#F4F3EE;
  color:#48372F;
}

/* container */
.container{
  width:90%;
  max-width:1100px;
  margin:auto;
  padding:60px 0;
}

/* title */
h1{
  font-family:'Playfair Display', serif;
  text-align:center;
  font-size:40px;
  margin-bottom:10px;
}

p{
  text-align:center;
  color:#6D6943;
  margin-bottom:40px;
}

/* GRID (3 columns for aesthetic layout) */
.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:20px;
}

/* images */
img{
  width:100%;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.3s ease;
}

img:hover{
  transform:scale(1.03);
}

/* back button */
a{
  display:inline-block;
  margin:40px auto 0;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid #48372F;
  text-decoration:none;
  color:#48372F;
  transition:0.2s ease;
}

a:hover{
  background:#48372F;
  color:#F4F3EE;
}

.center{
  text-align:center;
}

/* responsive for mobile */
@media(max-width:768px){
  .grid{
    grid-template-columns:repeat(2, 1fr);
  }
}

@media(max-width:480px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>brand palettes</h1>

<p>color directions for student brands + small businesses</p>

<div class="grid">

<img src="palette1.png" alt="palette 1">
<img src="palette2.png" alt="palette 2">
<img src="palette3.png" alt="palette 3">
<img src="palette4.png" alt="palette 4">
<img src="palette5.png" alt="palette 5">
<img src="palette6.png" alt="palette 6">

<img src="palette4.png">
<img src="palette5.png">
<img src="palette6.png">
  
</div>

<div class="center">
<a href="index.html">← back to home</a>
</div>

</div>

</body>
</html>
